# Live-lane CI — DEVIATOR class (representative: F.6 audit). workflow_dispatch ONLY.
name: live-deviator
on:
  workflow_dispatch:
    inputs:
      pytest_args:
        description: 'Extra pytest args'
        required: false
        default: 'packages/agents/audit'
jobs:
  live-deviator:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          version: '0.11.1'
      - run: uv python install 3.12
      - run: uv sync --all-extras --all-packages
      - name: run deviator live lane (NEXUS_LIVE_AUDIT)
        env:
          NEXUS_LIVE_AUDIT: '1'
        run: uv run pytest ${{ github.event.inputs.pytest_args }} -v --no-cov
