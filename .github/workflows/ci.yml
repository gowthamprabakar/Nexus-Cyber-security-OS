name: ci

on:
  pull_request:
  push:
    branches: [main]

jobs:
  python-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          # 0.11.x supports `uv sync --all-packages` (added in 0.5.0); the
          # previous pin to 0.4.27 predates that flag, so the workspace
          # editable installs never landed and `uv run pytest` couldn't find
          # the workspace console scripts. Matched to the local dev tooling.
          version: '0.11.1'
      - run: uv python install 3.12
      # --all-packages installs every workspace member as editable (without
      # it, `uv run pytest` can't find the workspace-member console scripts
      # or the local-import paths the test suite relies on). --all-extras
      # picks up every member's [project.optional-dependencies] (pytest +
      # plugins live there per-package).
      - run: uv sync --all-extras --all-packages
      - run: uv run pytest -v --cov --cov-report=xml
      - uses: codecov/codecov-action@v4
        with:
          fail_ci_if_error: false
        if: always()

  typescript-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.10.0
      - uses: actions/setup-node@v4
        with:
          node-version: 20.11.1
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm test
