# Live-lane CI — LLM-AGENT class (representative: D.13 synthesis). workflow_dispatch ONLY.
# Makes REAL DeepSeek/Anthropic calls (cost) — operator-triggered with provider secrets. Without
# NEXUS_LLM_* + an API key the lane skips (gated).
name: live-llm
on:
  workflow_dispatch:
    inputs:
      pytest_args:
        description: 'Extra pytest args'
        required: false
        default: 'packages/agents/synthesis'
jobs:
  live-llm:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          version: '0.11.1'
      - run: uv python install 3.12
      - run: uv sync --all-extras --all-packages
      - name: run LLM live lane (NEXUS_LIVE_LLM + NEXUS_LIVE_SYNTHESIS)
        env:
          NEXUS_LIVE_LLM: '1'
          NEXUS_LIVE_SYNTHESIS: '1'
          NEXUS_LLM_PROVIDER: ${{ secrets.NEXUS_LLM_PROVIDER }}
          NEXUS_LLM_MODEL_PIN: ${{ secrets.NEXUS_LLM_MODEL_PIN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: uv run pytest ${{ github.event.inputs.pytest_args }} -v --no-cov
