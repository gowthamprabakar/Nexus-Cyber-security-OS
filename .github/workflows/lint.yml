name: lint

on:
  pull_request:
  push:
    branches: [main]

jobs:
  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          version: '0.4.27'
      - name: Install python
        run: uv python install 3.12
      - name: Sync workspace
        # --all-packages installs every workspace member as editable (without
        # it, ruff/mypy can resolve modules but pytest in `ci.yml` can't find
        # workspace console scripts). Keeping the two workflows in sync.
        run: uv sync --all-extras --all-packages
      - name: Ruff check
        run: uv run ruff check .
      - name: Ruff format check
        run: uv run ruff format --check .
      - name: Mypy
        # No path argument: use the `files = [...]` list in pyproject.toml,
        # which targets every package's src/ directory and excludes alembic
        # env.py files (both `packages/charter/alembic/env.py` and
        # `packages/control-plane/alembic/env.py` are module-named `env`, so
        # `uv run mypy packages` errors with "Duplicate module named 'env'").
        run: uv run mypy

  typescript:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.10.0
      - uses: actions/setup-node@v4
        with:
          node-version: 20.11.1
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm typecheck

  go:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: 'go.work'
      - name: go vet (skip if no modules)
        run: |
          if [ -n "$(find packages -name '*.go' -not -path '*/.*' 2>/dev/null | head -1)" ]; then
            go vet ./...
          else
            echo "No Go files yet — skipping go vet"
          fi
        shell: bash
