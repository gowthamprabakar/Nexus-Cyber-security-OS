[project]
name = "nexus-control-plane"
version = "0.1.0"
description = "Nexus control plane — auth (Auth0 SSO/SCIM/RBAC/MFA) + tenant manager"
requires-python = ">=3.12,<3.13"
license = { file = "../../LICENSE-BSL" }
dependencies = [
    "nexus-charter",
    "nexus-shared",
    "pydantic>=2.9.0",
    "fastapi>=0.115.0",
    "httpx>=0.27.0",
    "pyjwt[crypto]>=2.9.0",
    "sqlalchemy>=2.0.30",
    "asyncpg>=0.29.0",
    "alembic>=1.13.0",
    "tenacity>=9.0.0",
    "structlog>=24.4.0",
    "python-ulid>=2.0.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.3.0",
    "pytest-asyncio>=0.24.0",
    "pytest-cov>=5.0.0",
    "pytest-mock>=3.14.0",
    "respx>=0.21.0",
    "freezegun>=1.5.0",
    "httpx[http2]>=0.27.0",
]

[tool.uv.sources]
nexus-charter = { workspace = true }
nexus-shared = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/control_plane"]
