[project]
name = "nexus-aispm-agent"
version = "0.1.0"
description = "Nexus AI-SPM Agent — AI Security Posture Management (D.11 under ADR-007); AI deployment discovery + prompt-injection detection + AI inventory on the fleet graph"
requires-python = ">=3.12,<3.13"
license = { file = "../../../LICENSE-BSL" }
dependencies = [
    "nexus-charter",
    "nexus-shared",
    "nexus-eval-framework",
    "pydantic>=2.9.0",
    "boto3>=1.34.0",
    "azure-identity>=1.17.0",
    "azure-mgmt-cognitiveservices>=13.5.0",
    "google-cloud-aiplatform>=1.60.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.3.0",
    "pytest-asyncio>=0.24.0",
    "pytest-cov>=5.0.0",
    "pytest-mock>=3.14.0",
    "aiosqlite>=0.20.0",
]

[project.entry-points."nexus_eval_runners"]
aispm = "aispm.eval_runner:AISPMEvalRunner"

[tool.uv.sources]
nexus-charter = { workspace = true }
nexus-shared = { workspace = true }
nexus-eval-framework = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/aispm"]
