case_id: 003_tampered_chain_detected
description: 3-event chain with the middle entry's payload mutated post-hash — chain_valid=false.
fixture:
  jsonl_events:
    - agent: cloud_posture
      run_id: corr-001
      action: episode_appended
      payload: { finding_id: F-1 }
    - agent: cloud_posture
      run_id: corr-002
      action: episode_appended
      payload: { finding_id: F-2 }
    - agent: cloud_posture
      run_id: corr-003
      action: episode_appended
      payload: { finding_id: F-3 }
  memory_events: []
  tampered_jsonl_index: 1
  query:
    since: null
    until: null
    action: null
    agent_id: null
    correlation_id: null
expected:
  # Events still land — the chain report (chain_valid=false) is what
  # surfaces the tamper. Compliance operators want to see what was
  # tampered, not have it hidden. See nlah/examples/02-tamper-detected.md.
  total: 3
  chain_valid: false
  count_by_action:
    episode_appended: 3
