case_id: 012_promotion_blocked_at_stage_2
description: |
  Stage 2 + execute mode → REFUSED_PROMOTION_GATE. Authorization permits execute
  (mode_execute_authorized: true) so the auth gate passes; the promotion gate
  then refuses because execute requires Stage 3+ and the action class has only
  reached Stage 2 (one advance(1→2) sign-off, no advance(2→3) yet).
  Executable after A.1 v0.1.1 Task 12 wires fixture.promotion into the runner.
fixture:
  mode: execute
  authorization:
    mode_recommend_authorized: true
    mode_dry_run_authorized: true
    mode_execute_authorized: true
    authorized_actions:
      - remediation_k8s_patch_runAsNonRoot
    max_actions_per_run: 5
    rollback_window_sec: 300
  # Promotion-state assumption: Stage 2 for runAsNonRoot — one advance(1→2)
  # sign-off but no advance(2→3). Execute mode requires Stage 3+ so the
  # per-finding pre-flight gate refuses with REFUSED_PROMOTION_GATE.
  promotion:
    schema_version: '0.1'
    cluster_id: eval-fixture
    created_at: '2026-05-17T00:00:00Z'
    last_modified_at: '2026-05-17T00:00:00Z'
    action_classes:
      remediation_k8s_patch_runAsNonRoot:
        action_type: remediation_k8s_patch_runAsNonRoot
        stage: 2
        sign_offs:
          - event_kind: advance
            operator: eval-fixture
            timestamp: '2026-05-17T00:00:00Z'
            reason: eval fixture graduated to Stage 2; execute will refuse
            from_stage: 1
            to_stage: 2
  findings:
    - rule_id: run-as-root
      rule_title: Container running as root
      severity: high
      workload_kind: Deployment
      workload_name: api
      namespace: production
      container_name: api
      manifest_path: cluster:///production/Deployment/api
      detected_at: '2026-05-16T12:00:00Z'
