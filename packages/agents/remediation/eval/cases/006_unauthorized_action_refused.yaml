case_id: 006_unauthorized_action_refused
description: |
  A finding whose action class exists but isn't in `authorized_actions` allowlist → refused.
  The agent never builds an artifact for it; the outcome is REFUSED_UNAUTHORIZED.

  Also covers: a finding with no v0.1 action class (`privileged-container`) — refused with
  the "no v0.1 action class" reason.
fixture:
  mode: recommend
  authorization:
    mode_recommend_authorized: true
    mode_dry_run_authorized: false
    mode_execute_authorized: false
    authorized_actions: [] # empty allowlist
    max_actions_per_run: 5
    rollback_window_sec: 300
  # Promotion-state assumption: irrelevant — authz refusal fires BEFORE
  # the promotion gate (Stage 2 in the pipeline; gate is Stage 0).
  # Declaring empty action_classes for documentation symmetry only.
  promotion:
    schema_version: '0.1'
    cluster_id: eval-fixture
    created_at: '2026-05-17T00:00:00Z'
    last_modified_at: '2026-05-17T00:00:00Z'
    action_classes: {}
  findings:
    - rule_id: run-as-root
      rule_title: Container running as root
      severity: high
      workload_kind: Deployment
      workload_name: frontend
      namespace: production
      container_name: nginx
      manifest_path: cluster:///production/Deployment/frontend
      detected_at: '2026-05-16T12:00:00Z'
    - rule_id: privileged-container
      rule_title: Privileged container
      severity: high
      workload_kind: DaemonSet
      workload_name: node-exporter
      namespace: monitoring
      container_name: exporter
      manifest_path: cluster:///monitoring/DaemonSet/node-exporter
      detected_at: '2026-05-16T12:00:00Z'
expected:
  finding_count: 2
  by_outcome:
    refused_unauthorized: 2
