case_id: 011_promotion_blocked_at_stage_1
description: |
  Stage 1 + dry_run mode → REFUSED_PROMOTION_GATE. Authorization permits dry_run
  (mode_dry_run_authorized: true) so the auth gate passes; the promotion gate
  then refuses because dry_run requires Stage 2+ and the action class is still
  at the Stage-1 floor (no advance sign-off has been recorded).
  Executable after A.1 v0.1.1 Task 12 wires fixture.promotion into the runner.
fixture:
  mode: dry_run
  authorization:
    mode_recommend_authorized: true
    mode_dry_run_authorized: true
    mode_execute_authorized: false
    authorized_actions:
      - remediation_k8s_patch_runAsNonRoot
    max_actions_per_run: 5
    rollback_window_sec: 300
  # Promotion-state assumption: empty action_classes — the gate reads
  # Stage 1 (the floor) for runAsNonRoot. dry_run mode requires Stage 2+
  # so the per-finding pre-flight gate refuses with REFUSED_PROMOTION_GATE.
  promotion:
    schema_version: '0.1'
    cluster_id: eval-fixture
    created_at: '2026-05-17T00:00:00Z'
    last_modified_at: '2026-05-17T00:00:00Z'
    action_classes: {}
  findings:
    - rule_id: run-as-root
      rule_title: Container running as root
      severity: high
      workload_kind: Deployment
      workload_name: api
      namespace: production
      container_name: api
      manifest_path: cluster:///production/Deployment/api
      detected_at: '2026-05-16T12:00:00Z'
expected:
  finding_count: 1
  by_outcome:
    refused_promotion_gate: 1
