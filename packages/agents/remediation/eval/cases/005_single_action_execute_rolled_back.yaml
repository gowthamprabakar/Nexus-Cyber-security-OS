  dry_run_result:
    exit_code: 0
  execute_result:
    exit_code: 0
  rollback_result:
    exit_code: 0
  post_validate_findings:
    - rule_id: run-as-root
      rule_title: Container running as root
      severity: high
      workload_kind: Deployment
      workload_name: legacy
      namespace: production
      container_name: legacy
      manifest_path: cluster:///production/Deployment/legacy
