[project]
name = "nexus-remediation-agent"
version = "0.1.0"
description = "Nexus Remediation Agent — production-action remediation across recommend/dry-run/execute modes (A.1 / Agent #10 under ADR-007)"
requires-python = ">=3.12,<3.13"
license = { file = "../../../LICENSE-BSL" }
dependencies = [
    "nexus-charter",
    "nexus-shared",
    "nexus-eval-framework",
    "nexus-cloud-posture",
    "nexus-k8s-posture-agent",
    "pydantic>=2.9.0",
    "pyyaml>=6.0.2",
    "click>=8.1.0",
    "structlog>=24.4.0",
    "kubernetes>=31.0.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.3.0",
    "pytest-asyncio>=0.24.0",
    "pytest-cov>=5.0.0",
    "pytest-mock>=3.14.0",
    "types-PyYAML>=6.0.0",
]

[project.scripts]
remediation = "remediation.cli:main"

[project.entry-points."nexus_eval_runners"]
remediation = "remediation.eval_runner:RemediationEvalRunner"

[tool.uv.sources]
nexus-charter = { workspace = true }
nexus-shared = { workspace = true }
nexus-eval-framework = { workspace = true }
nexus-cloud-posture = { workspace = true }
nexus-k8s-posture-agent = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/remediation"]
