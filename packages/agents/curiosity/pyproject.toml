[project]
name = "nexus-curiosity-agent"
version = "0.2.0"
description = "Nexus Curiosity Agent — proactive hypothesis-emission over SemanticStore state (D.12 / Agent #15 under ADR-007)"
requires-python = ">=3.12,<3.13"
license = { file = "../../../LICENSE-BSL" }
dependencies = [
    "nexus-charter",
    "nexus-shared",
    "nexus-eval-framework",
    "nexus-synthesis-agent",
    "nexus-cloud-posture",
    "nexus-compliance-agent",
    "nexus-threat-intel-agent",
    "pydantic>=2.9.0",
    "pyyaml>=6.0.2",
    "click>=8.1.0",
    "structlog>=24.4.0",
    "python-ulid>=2.7.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.3.0",
    "pytest-asyncio>=0.24.0",
    "pytest-cov>=5.0.0",
    "pytest-mock>=3.14.0",
    "types-PyYAML>=6.0.0",
]

[project.scripts]
curiosity = "curiosity.cli:main"

[project.entry-points."nexus_eval_runners"]
curiosity = "curiosity.eval_runner:CuriosityEvalRunner"

[tool.uv.sources]
nexus-charter = { workspace = true }
nexus-shared = { workspace = true }
nexus-eval-framework = { workspace = true }
nexus-synthesis-agent = { workspace = true }
nexus-cloud-posture = { workspace = true }
nexus-compliance-agent = { workspace = true }
nexus-threat-intel-agent = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/curiosity"]
