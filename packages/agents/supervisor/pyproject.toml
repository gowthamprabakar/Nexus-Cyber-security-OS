[project]
name = "nexus-supervisor-agent"
version = "0.2.0"
description = "Nexus Supervisor Agent — declarative router + parallel dispatcher + heartbeat orchestrator (#0 / Agent #17 under ADR-007)"
requires-python = ">=3.12,<3.13"
license = { file = "../../../LICENSE-BSL" }
dependencies = [
    "nexus-charter",
    "nexus-shared",
    "nexus-eval-framework",
    "nexus-runtime",
    "pydantic>=2.9.0",
    "pyyaml>=6.0.2",
    "click>=8.1.0",
    "structlog>=24.4.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.3.0",
    "pytest-asyncio>=0.24.0",
    "pytest-cov>=5.0.0",
    "pytest-mock>=3.14.0",
    "types-PyYAML>=6.0.0",
    "aiosqlite>=0.20.0",
    "nexus-integration",
]

[project.scripts]
supervisor = "supervisor.cli:main"

[project.entry-points."nexus_eval_runners"]
supervisor = "supervisor.eval_runner:SupervisorEvalRunner"

[tool.uv.sources]
nexus-runtime = { workspace = true }
nexus-charter = { workspace = true }
nexus-shared = { workspace = true }
nexus-eval-framework = { workspace = true }
nexus-integration = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/supervisor"]
