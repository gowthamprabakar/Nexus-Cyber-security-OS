[project]
name = "nexus-sspm-agent"
version = "0.1.0"
description = "Nexus SSPM Agent — SaaS Security Posture Management (D.10 under ADR-007); GitHub-org / M365 / Slack posture + SaaS inventory on the fleet graph"
requires-python = ">=3.12,<3.13"
license = { file = "../../../LICENSE-BSL" }
dependencies = [
    "nexus-charter",
    "nexus-shared",
    "pydantic>=2.9.0",
    "httpx>=0.27.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.3.0",
    "pytest-asyncio>=0.24.0",
    "pytest-cov>=5.0.0",
    "pytest-mock>=3.14.0",
]

[tool.uv.sources]
nexus-charter = { workspace = true }
nexus-shared = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/sspm"]
