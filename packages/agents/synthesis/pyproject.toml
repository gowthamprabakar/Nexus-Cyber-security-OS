[project]
name = "nexus-synthesis-agent"
version = "0.2.0"
description = "Nexus Synthesis Agent — LLM-narrated synthesis over D.7 / D.6 / F.3 (D.13 / Agent #14 under ADR-007)"
requires-python = ">=3.12,<3.13"
license = { file = "../../../LICENSE-BSL" }
dependencies = [
    "nexus-charter",
    "nexus-shared",
    "nexus-eval-framework",
    "nexus-investigation-agent",
    "nexus-compliance-agent",
    "nexus-cloud-posture",
    "pydantic>=2.9.0",
    "pyyaml>=6.0.2",
    "click>=8.1.0",
    "structlog>=24.4.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.3.0",
    "pytest-asyncio>=0.24.0",
    "pytest-cov>=5.0.0",
    "pytest-mock>=3.14.0",
    "types-PyYAML>=6.0.0",
]

[project.scripts]
synthesis = "synthesis.cli:main"

[project.entry-points."nexus_eval_runners"]
synthesis = "synthesis.eval_runner:SynthesisEvalRunner"

[tool.uv.sources]
nexus-charter = { workspace = true }
nexus-shared = { workspace = true }
nexus-eval-framework = { workspace = true }
nexus-investigation-agent = { workspace = true }
nexus-compliance-agent = { workspace = true }
nexus-cloud-posture = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/synthesis"]
