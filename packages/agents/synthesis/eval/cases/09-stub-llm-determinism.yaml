case_id: stub_llm_determinism
description: |
  WI-3 acceptance probe. Stub-LLM canned responses + deterministic
  context bundle => byte-equal output across reruns. The runner's
  default fake provider has fixed 100/50 token counts; the agent's
  cited-id dedupe is deterministic; the markdown renderer is
  deterministic. This case asserts the substring contract; the
  Task 13 stub harness will lift byte-equality to a top-level
  invariant.
tags: [happy-path, wi-3, determinism]
fixture:
  cloud_posture_findings:
    - class_uid: 2003
      severity_id: 3
      finding_info:
        uid: CSPM-AWS-LOG-001
        title: CloudTrail not multi-region
  llm_responses:
