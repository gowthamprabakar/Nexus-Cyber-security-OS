[project]
name = "nexus-threat-intel-agent"
version = "0.2.0"
description = "Nexus Threat Intel Agent — NVD + CISA KEV + MITRE ATT&CK correlation (D.8 / Agent #12 under ADR-007)"
requires-python = ">=3.12,<3.13"
license = { file = "../../../LICENSE-BSL" }
dependencies = [
    "nexus-charter",
    "nexus-shared",
    "nexus-eval-framework",
    "nexus-network-threat-agent",
    "nexus-cloud-posture",
    "nexus-vulnerability",
    "nexus-runtime-threat",
    "pydantic>=2.9.0",
    "pyyaml>=6.0.2",
    "click>=8.1.0",
    "structlog>=24.4.0",
    "httpx>=0.27.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.3.0",
    "pytest-asyncio>=0.24.0",
    "pytest-cov>=5.0.0",
    "pytest-mock>=3.14.0",
    "types-PyYAML>=6.0.0",
]

[project.scripts]
threat-intel = "threat_intel.cli:main"

[project.entry-points."nexus_eval_runners"]
threat_intel = "threat_intel.eval_runner:ThreatIntelEvalRunner"

[tool.uv.sources]
nexus-charter = { workspace = true }
nexus-shared = { workspace = true }
nexus-eval-framework = { workspace = true }
nexus-network-threat-agent = { workspace = true }
nexus-cloud-posture = { workspace = true }
nexus-vulnerability = { workspace = true }
nexus-runtime-threat = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/threat_intel"]
