[project]
name = "nexus-identity"
version = "0.1.0"
description = "Nexus Identity Agent — CIEM (Cloud Infrastructure Entitlement Management) for AWS"
requires-python = ">=3.12,<3.13"
license = { file = "../../../LICENSE-BSL" }
dependencies = [
    "nexus-charter",
    "nexus-shared",
    "nexus-eval-framework",
    "boto3>=1.35.0",
    "botocore>=1.35.0",
    "pydantic>=2.9.0",
    "pyyaml>=6.0.2",
    "click>=8.1.0",
    "structlog>=24.4.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.3.0",
    "pytest-asyncio>=0.24.0",
    "pytest-cov>=5.0.0",
    "pytest-mock>=3.14.0",
    "moto>=5.0.0",
    "types-PyYAML>=6.0.0",
]

[project.scripts]
identity-agent = "identity.cli:main"

[project.entry-points."nexus_eval_runners"]
identity = "identity.eval_runner:IdentityEvalRunner"

[tool.uv.sources]
nexus-charter = { workspace = true }
nexus-shared = { workspace = true }
nexus-eval-framework = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/identity"]
