case_id: 17_operator_marks_skill_harmful_drops_composite
description: >
  Skill X has good adoption (10 loads) + perfect outcome (10 successes)
  — composite = 1.0 from adoption + outcome axes. Then an operator runs
  rate-skill --harmful against the skill. Feedback axis score = 0.0
  (single harmful rating maps to 0.0 on the 0-1 scale), confidence = 0.2
  (1 rating / 5 needed). Composite drops by feedback weight (0.40)
  proportionally.
