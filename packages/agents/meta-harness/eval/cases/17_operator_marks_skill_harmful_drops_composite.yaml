notes: >
  Before rating: adoption=1.0×1.0 + outcome=1.0×1.0 → composite=(0.25+0.35)/(0.25+0.35)=1.0.
  After harmful rating: feedback raw=(0-1)/1=-1.0, score=(-1+1)/2=0.0, conf=0.2.
  Composite = (0.25×1.0×1.0 + 0.35×1.0×1.0 + 0.40×0.0×0.2) / (0.25+0.35+0.08)
  = 0.60 / 0.68 ≈ 0.882. Global score drops from 1.0 to ~0.882.
  Cross-reference: Task 7 (skill_feedback.py), Task 11 (CLI rate-skill).
