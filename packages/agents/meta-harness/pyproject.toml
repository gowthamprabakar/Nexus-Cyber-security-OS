[project]
name = "nexus-meta-harness-agent"
version = "0.2.1"
description = "Nexus Meta-Harness Agent — cross-agent batch eval, NLAH A/B compare, scorecard delta tracking + autonomous skill creation + progressive-disclosure NLAH (A.4 v0.2 / Phase 1 Wave 0 under ADR-007 v1.4)"
requires-python = ">=3.12,<3.13"
license = { file = "../../../LICENSE-BSL" }
dependencies = [
    "nexus-charter",
    "nexus-shared",
    "nexus-eval-framework",
    "nexus-synthesis-agent",
    "pydantic>=2.9.0",
    "pyyaml>=6.0.2",
    "click>=8.1.0",
    "structlog>=24.4.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.3.0",
    "pytest-asyncio>=0.24.0",
    "pytest-cov>=5.0.0",
    "pytest-mock>=3.14.0",
    "types-PyYAML>=6.0.0",
]

[project.scripts]
meta-harness = "meta_harness.cli:main"

[project.entry-points."nexus_eval_runners"]
meta_harness = "meta_harness.eval_runner:MetaHarnessEvalRunner"

[tool.uv.sources]
nexus-charter = { workspace = true }
nexus-shared = { workspace = true }
nexus-eval-framework = { workspace = true }
nexus-synthesis-agent = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/meta_harness"]
