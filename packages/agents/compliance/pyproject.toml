[project]
name = "nexus-compliance-agent"
version = "0.2.0"
description = "Nexus Compliance Agent — maps sibling-agent findings to CIS AWS Foundations v3 controls (D.9 / Agent #13 under ADR-007)"
requires-python = ">=3.12,<3.13"
license = { file = "../../../LICENSE-BSL" }
dependencies = [
    "nexus-charter",
    "nexus-shared",
    "nexus-eval-framework",
    "nexus-cloud-posture",
    "nexus-data-security-agent",
    "pydantic>=2.9.0",
    "pyyaml>=6.0.2",
    "click>=8.1.0",
    "structlog>=24.4.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.3.0",
    "pytest-asyncio>=0.24.0",
    "pytest-cov>=5.0.0",
    "pytest-mock>=3.14.0",
    "types-PyYAML>=6.0.0",
]

[project.scripts]
compliance = "compliance.cli:main"

[project.entry-points."nexus_eval_runners"]
compliance = "compliance.eval_runner:ComplianceEvalRunner"

[tool.uv.sources]
nexus-charter = { workspace = true }
nexus-shared = { workspace = true }
nexus-eval-framework = { workspace = true }
nexus-cloud-posture = { workspace = true }
nexus-data-security-agent = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/compliance"]
