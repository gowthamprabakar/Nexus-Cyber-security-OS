[project]
name = "nexus-appsec-agent"
version = "0.1.0"
description = "Nexus AppSec Agent — SCM repo discovery + build-time IaC/SAST/secrets-in-code (D.14 / Agent #14 under ADR-007; SBOM boundary per ADR-014)"
requires-python = ">=3.12,<3.13"
license = { file = "../../../LICENSE-BSL" }
dependencies = [
    "nexus-charter",
    "nexus-shared",
    "nexus-eval-framework",
    "pydantic>=2.9.0",
    "click>=8.1.0",
    "structlog>=24.4.0",
    "httpx>=0.27.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.3.0",
    "pytest-asyncio>=0.24.0",
    "pytest-cov>=5.0.0",
    "pytest-mock>=3.14.0",
]

[project.scripts]
appsec = "appsec.cli:main"

[project.entry-points."nexus_eval_runners"]
appsec = "appsec.eval_runner:AppSecEvalRunner"

[tool.uv.sources]
nexus-charter = { workspace = true }
nexus-shared = { workspace = true }
nexus-eval-framework = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/appsec"]
