[project]
name = "nexus-runtime"
version = "0.1.0"
description = "Nexus runtime — cross-fleet production-loop driver (Phase C; A.0-orchestrated continuous dispatch)"
requires-python = ">=3.12,<3.13"
license = { file = "../../LICENSE-APACHE" }
dependencies = [
    "nexus-charter",
    "nexus-data-security-agent",
    "nexus-identity",
    "nexus-investigation-agent",
    "nexus-audit-agent",
    "python-ulid>=3.0.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.3.0",
    "pytest-asyncio>=0.24.0",
    "pytest-cov>=5.0.0",
    "aiosqlite>=0.20.0",
]

[tool.uv.sources]
nexus-charter = { workspace = true }
nexus-data-security-agent = { workspace = true }
nexus-identity = { workspace = true }
nexus-investigation-agent = { workspace = true }
nexus-audit-agent = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/nexus_runtime"]
