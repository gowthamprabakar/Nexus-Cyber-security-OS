[project]
name = "nexus-charter"
version = "0.1.0"
description = "Nexus runtime charter — execution contracts, budget enforcement, audit hash chain"
requires-python = ">=3.12,<3.13"
license = { file = "../../LICENSE-APACHE" }
dependencies = [
    "pydantic>=2.9.0",
    "pyyaml>=6.0.2",
    "cryptography>=43.0.0",
    "structlog>=24.4.0",
    "click>=8.1.0",
    "sqlalchemy>=2.0.30",
    "asyncpg>=0.29.0",
    "pgvector>=0.3.0",
    "greenlet>=3.1.0",
]

[project.optional-dependencies]
anthropic = [
    "anthropic>=0.36.0",
    "tenacity>=9.0.0",
]
# `openai-compatible` covers OpenAI proper plus any compatible HTTP endpoint:
# vLLM-local, Ollama, OpenRouter, Together, Fireworks, Groq, DeepSeek,
# llama.cpp server, LM Studio. See ADR-006.
openai-compatible = [
    "openai>=1.50.0",
    "tenacity>=9.0.0",
]
dev = [
    "pytest>=8.3.0",
    "pytest-asyncio>=0.24.0",
    "pytest-cov>=5.0.0",
    "hypothesis>=6.112.0",
    "freezegun>=1.5.0",
    "types-PyYAML>=6.0.0",
    "anthropic>=0.36.0",
    "openai>=1.50.0",
    "tenacity>=9.0.0",
    "aiosqlite>=0.20.0",
]

[project.scripts]
charter = "charter.cli:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/charter"]
