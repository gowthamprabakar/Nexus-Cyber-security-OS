[project]
name = "nexus-integration"
version = "0.1.0"
description = "Nexus fleet-test integration package — fleet_testkit shared helpers (v0.4 fleet test directive v2) + (later) the L6 pure-breed finale"
requires-python = ">=3.12,<3.13"
license = { file = "../../LICENSE-BSL" }
dependencies = [
    "nexus-charter",
    "nexus-shared",
    "pydantic>=2.9.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.3.0",
    "pytest-asyncio>=0.24.0",
    "aiosqlite>=0.20.0",
]

[tool.uv.sources]
nexus-charter = { workspace = true }
nexus-shared = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/fleet_testkit"]
