test_case_id: path8-c3-private-bucket-trap
description: One real cross-account hit beside a trap — a foreign-trusted role with access to a
  PRIVATE PII bucket (not publicly exposed), which must not fire.
agent: identity
category: false_positive_traps
environment:
  fixture_path: inline
  realism_notes: Tests the public-exposure axis. Cross-account trust to a private bucket has no
    EXPOSES_DATA edge to reach — only public sensitive data is a path-8 exposure.
  buckets:
    - name: acme-pii
      public: true
      objects:
        hr.csv: "name,ssn\nJane Roe,123-45-6789"
    - name: acme-private-pii
      public: false
      objects:
        hr.csv: "name,ssn\nJohn Doe,987-65-4321"
  roles:
    - name: partner-access
      trust: external
      grant_resource: 'arn:aws:s3:::acme-pii/*'
    - name: partner-private
      trust: external
      grant_resource: 'arn:aws:s3:::acme-private-pii/*'
ground_truth_violations:
  - id: gt-external-pii
    type: external_trust
    resource: arn:aws:s3:::acme-pii
    severity: high
    data_type: ssn
    principal: arn:aws:iam::123456789012:role/partner-access
expected_non_detections:
  - id: nd-private
    resource: arn:aws:s3:::acme-private-pii
    reason: foreign-trusted but the data bucket is private — not publicly exposed.
pass_criteria:
  precision: 1.0
  recall: 1.0
  false_positives_max: 0
