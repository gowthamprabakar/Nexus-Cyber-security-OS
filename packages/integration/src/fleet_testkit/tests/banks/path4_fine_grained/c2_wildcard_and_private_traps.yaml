test_case_id: path4-c2-wildcard-and-private-traps
description: One real fine-grained hit beside two traps — a role granted "*" (broad, not
  fine-grained-to-a-resource) and a role reading a PRIVATE PII bucket (not publicly exposed).
agent: identity
category: false_positive_traps
environment:
  fixture_path: inline
  realism_notes: Tests both filters. Resource "*" is skipped by _fine_grained_grants (broad, not
    concrete); access to a private bucket has no EXPOSES_DATA edge to reach.
  buckets:
    - name: acme-pii
      public: true
      objects:
        hr.csv: "name,ssn\nJane Roe,123-45-6789"
    - name: acme-private-pii
      public: false
      objects:
        hr.csv: "name,ssn\nJohn Doe,987-65-4321"
  roles:
    - name: pii-reader
      grant_resource: 'arn:aws:s3:::acme-pii/*'
    - name: wildcard-reader
      grant_resource: '*'
    - name: private-reader
      grant_resource: 'arn:aws:s3:::acme-private-pii/*'
ground_truth_violations:
  - id: gt-reader-pii
    type: fine_grained_data
    resource: arn:aws:s3:::acme-pii
    severity: high
    data_type: ssn
    principal: arn:aws:iam::123456789012:role/pii-reader
expected_non_detections:
  - id: nd-wildcard
    resource: arn:aws:s3:::acme-pii
    reason: a "*" resource grant is broad, not fine-grained access to a specific bucket.
  - id: nd-private
    resource: arn:aws:s3:::acme-private-pii
    reason: access to a private bucket — no public EXPOSES_DATA to reach.
pass_criteria:
  precision: 1.0
  recall: 1.0
  false_positives_max: 0
