test_case_id: path2-c2-private-and-clean-traps
description: One real hit beside two traps — a PRIVATE workload running a vulnerable image (not
  internet-exposed) and a PUBLIC workload running a CLEAN image (no CVEs).
agent: cloud-posture
category: false_positive_traps
environment:
  fixture_path: inline
  realism_notes: Tests both legs. The private workload's image is genuinely vulnerable but not
    exposed; the public workload's image (certifi) has no HIGH/CRITICAL CVE.
  workloads:
    - name: web
      image: 'myreg/web-vuln:1.0'
      public: true
      vulnerable_requirements: "Django==2.0.0\n"
    - name: backend
      image: 'myreg/backend-vuln:1.0'
      public: false
      vulnerable_requirements: "Django==2.0.0\n"
    - name: edge
      image: 'myreg/edge-clean:1.0'
      public: true
      vulnerable_requirements: "certifi==2024.2.2\n"
ground_truth_violations:
  - id: gt-exposed-vuln
    type: internet_exposed_vulnerable
    resource: 'myreg/web-vuln:1.0'
    severity: critical
expected_non_detections:
  - id: nd-private-vuln
    resource: 'myreg/backend-vuln:1.0'
    reason: vulnerable image but the workload is not internet-exposed.
  - id: nd-public-clean
    resource: 'myreg/edge-clean:1.0'
    reason: internet-exposed but the image has no known HIGH/CRITICAL CVE.
pass_criteria:
  precision: 1.0
  recall: 1.0
  false_positives_max: 0
