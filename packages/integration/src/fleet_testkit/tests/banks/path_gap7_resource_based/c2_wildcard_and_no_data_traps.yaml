test_case_id: gap7-c2-wildcard-and-no-data-traps
description: One real resource-based hit beside two traps — a wildcard-principal policy (that is
  PUBLIC, gap #1, not a named grant) and a named grant on a bucket with no sensitive data.
agent: data-security
category: false_positive_traps
environment:
  fixture_path: inline
  realism_notes: Tests precision. A "*" principal is public (not a named resource-based reader);
    a named grant with no sensitive content has nothing to expose.
  buckets:
    - name: shared-pii
      public: false
      policy_readers:
        - 'arn:aws:iam::999999999999:role/partner'
      objects:
        hr.csv: "name,ssn\nJane Roe,123-45-6789"
    - name: wildcard-pii
      public: false
      policy_readers:
        - '*'
      objects:
        hr.csv: "name,ssn\nJohn Doe,987-65-4321"
    - name: shared-clean
      public: false
      policy_readers:
        - 'arn:aws:iam::999999999999:role/partner'
      objects:
        readme.txt: 'nothing sensitive here, lorem ipsum'
ground_truth_violations:
  - id: gt-resource-based
    type: resource_based_data
    resource: arn:aws:s3:::shared-pii
    severity: high
    data_type: ssn
    principal: 'arn:aws:iam::999999999999:role/partner'
expected_non_detections:
  - id: nd-wildcard
    resource: arn:aws:s3:::wildcard-pii
    reason: a "*" principal is public exposure (gap #1), not a named resource-based grant.
  - id: nd-clean
    resource: arn:aws:s3:::shared-clean
    reason: named grant but no sensitive data to expose.
pass_criteria:
  precision: 1.0
  recall: 1.0
  false_positives_max: 0
