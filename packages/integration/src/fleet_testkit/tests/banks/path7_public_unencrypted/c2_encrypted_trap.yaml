test_case_id: path7-c2-encrypted-trap
description: One real hit (public + unencrypted + PII) beside a false-positive trap — a public
  bucket with the SAME PII but ENCRYPTED at rest, which must NOT be a path-7 exposure.
agent: data-security
category: false_positive_traps
environment:
  fixture_path: inline
  realism_notes: Tests the encryption axis. SSE=AES256 → is_encrypted=True → the bucket is public
    + sensitive but encrypted, so it is path-1/3 territory, not the unencrypted archetype.
  buckets:
    - name: acme-clear-pii
      public: true
      encrypted: false
      objects:
        hr.csv: "name,ssn\nJane Roe,123-45-6789"
    - name: acme-encrypted-pii
      public: true
      encrypted: true
      objects:
        hr.csv: "name,ssn\nJohn Doe,987-65-4321"
ground_truth_violations:
  - id: gt-clear-pii
    type: public_unencrypted
    resource: arn:aws:s3:::acme-clear-pii
    severity: high
    data_type: ssn
expected_non_detections:
  - id: nd-encrypted-pii
    resource: arn:aws:s3:::acme-encrypted-pii
    reason: public sensitive data but encrypted at rest — not the unencrypted archetype.
pass_criteria:
  precision: 1.0
  recall: 1.0
  false_positives_max: 0
