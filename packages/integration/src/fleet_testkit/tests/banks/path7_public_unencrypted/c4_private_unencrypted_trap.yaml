test_case_id: path7-c4-private-unencrypted-trap
description: One real hit (public + unencrypted + PII) beside a private unencrypted bucket with
  the same PII — private data is not publicly exposed, so it must NOT be reported.
agent: data-security
category: false_positive_traps
environment:
  fixture_path: inline
  realism_notes: Tests the public axis. The private bucket is unencrypted and sensitive but not
    public → no EXPOSES_DATA edge → not a path-7 exposure.
  buckets:
    - name: acme-clear-pii
      public: true
      encrypted: false
      objects:
        hr.csv: "name,ssn\nJane Roe,123-45-6789"
    - name: acme-private-clear-pii
      public: false
      encrypted: false
      objects:
        hr.csv: "name,ssn\nJohn Doe,987-65-4321"
ground_truth_violations:
  - id: gt-clear-pii
    type: public_unencrypted
    resource: arn:aws:s3:::acme-clear-pii
    severity: high
    data_type: ssn
expected_non_detections:
  - id: nd-private-clear-pii
    resource: arn:aws:s3:::acme-private-clear-pii
    reason: unencrypted sensitive data but in a private bucket — not publicly exposed.
pass_criteria:
  precision: 1.0
  recall: 1.0
  false_positives_max: 0
