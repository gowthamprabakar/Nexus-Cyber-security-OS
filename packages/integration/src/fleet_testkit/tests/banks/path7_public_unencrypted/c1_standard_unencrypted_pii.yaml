test_case_id: path7-c1-standard-unencrypted-pii
description: A public, unencrypted S3 bucket holds PII (SSN) — public sensitive data not even
  encrypted at rest. The canonical path-7 hit.
agent: data-security
category: standard_violations
environment:
  fixture_path: inline
  realism_notes: A default moto bucket has no SSE → data-security reads is_encrypted=False; the
    SSN pattern (NNN-NN-NNNN) is the real classifier match.
  buckets:
    - name: acme-clear-pii
      public: true
      encrypted: false
      objects:
        hr.csv: "name,ssn\nJane Roe,123-45-6789"
ground_truth_violations:
  - id: gt-unencrypted-ssn
    type: public_unencrypted
    resource: arn:aws:s3:::acme-clear-pii
    severity: high
    data_type: ssn
pass_criteria:
  precision: 1.0
  recall: 1.0
  false_positives_max: 0
