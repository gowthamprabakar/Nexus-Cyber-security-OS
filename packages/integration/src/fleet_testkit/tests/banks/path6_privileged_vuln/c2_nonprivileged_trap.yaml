test_case_id: path6-c2-nonprivileged-trap
description: One real hit beside a trap — a NON-privileged pod running the same vulnerable image.
  A vulnerable but unprivileged pod cannot escape to the node, so it must not fire.
agent: k8s-posture
category: false_positive_traps
environment:
  fixture_path: inline
  realism_notes: Tests the privilege axis. Only the privileged pod is a node-escape path; the
    unprivileged pod is a normal workload-vuln (a different archetype).
  pods:
    - name: priv-web
      image: 'myreg/k8s-vuln:1.0'
      privileged: true
      vulnerable_requirements: "Django==2.0.0\n"
    - name: normal-web
      image: 'myreg/k8s-normal:1.0'
      privileged: false
      vulnerable_requirements: "Django==2.0.0\n"
ground_truth_violations:
  - id: gt-priv-vuln
    type: privileged_vulnerable
    resource: 'myreg/k8s-vuln:1.0'
    severity: critical
expected_non_detections:
  - id: nd-nonpriv
    resource: 'myreg/k8s-normal:1.0'
    reason: vulnerable but not privileged — no container-escape path.
pass_criteria:
  precision: 1.0
  recall: 1.0
  false_positives_max: 0
