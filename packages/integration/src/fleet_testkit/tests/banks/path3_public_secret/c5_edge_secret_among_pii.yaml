test_case_id: path3-c5-edge-secret-among-pii
description: A public bucket exposes BOTH an AWS key and an SSN (different objects). Path 3 must
  report exactly the secret — the PII is a different archetype and must not surface as a secret.
agent: data-security
category: edge_cases
environment:
  fixture_path: inline
  realism_notes: Mixed-sensitivity bucket. The secret filter must isolate the credential from the
    PII (which belongs to the public-data / unencrypted archetypes, not public-secret).
  buckets:
    - name: acme-mixed
      public: true
      objects:
        creds.txt: 'aws_access_key_id = AKIAIOSFODNN7EXAMPLE'
        patients.csv: "name,ssn\nJane Roe,123-45-6789"
ground_truth_violations:
  - id: gt-key-in-mixed
    type: public_secret
    resource: arn:aws:s3:::acme-mixed
    severity: critical
    data_type: aws_access_key
pass_criteria:
  precision: 1.0
  recall: 1.0
  false_positives_max: 0
