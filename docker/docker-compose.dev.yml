name: nexus-dev

services:
  postgres:
    # pgvector ships pg16 + the `vector` extension preinstalled; charter.memory's
    # F.5 alembic baseline calls CREATE EXTENSION vector + ltree on upgrade, so
    # we need an image with both available. Drop-in replacement for postgres:16.
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: nexus
      POSTGRES_PASSWORD: nexus_dev
      POSTGRES_DB: nexus
    ports: ['5432:5432']
    volumes:
      - ./.data/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U nexus']
      interval: 5s

  timescale:
    image: timescale/timescaledb:latest-pg16
    environment:
      POSTGRES_USER: nexus
      POSTGRES_PASSWORD: nexus_dev
      POSTGRES_DB: nexus_episodic
    ports: ['5433:5432']
    volumes:
      - ./.data/timescale:/var/lib/postgresql/data

  neo4j:
    image: neo4j:5.24-community
    environment:
      NEO4J_AUTH: neo4j/nexus_dev_password
      NEO4J_PLUGINS: '["apoc"]'
    ports:
      - '7474:7474'
      - '7687:7687'
    volumes:
      - ./.data/neo4j:/data

  nats:
    image: nats:2.10-alpine
    command: ['-js']
    ports:
      - '4222:4222'
      - '8222:8222'

  redis:
    image: redis:7-alpine
    ports: ['6379:6379']

  localstack:
    image: localstack/localstack:3.8
    environment:
      SERVICES: s3,iam,sts,cloudtrail,kms,ec2,sns,sqs,lambda,logs
      DEFAULT_REGION: us-east-1
    ports: ['4566:4566']
    volumes:
      - ./.data/localstack:/var/lib/localstack
