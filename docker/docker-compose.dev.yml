name: nexus-dev

services:
  postgres:
    # pgvector ships pg16 + the `vector` extension preinstalled; charter.memory's
    # F.5 alembic baseline calls CREATE EXTENSION vector + ltree on upgrade, so
    # we need an image with both available. Drop-in replacement for postgres:16.
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: nexus
      POSTGRES_PASSWORD: nexus_dev
      POSTGRES_DB: nexus
    ports: ['5432:5432']
    volumes:
      - ./.data/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U nexus']
      interval: 5s

  timescale:
    image: timescale/timescaledb:latest-pg16
    environment:
      POSTGRES_USER: nexus
      POSTGRES_PASSWORD: nexus_dev
      POSTGRES_DB: nexus_episodic
    ports: ['5433:5432']
    volumes:
      - ./.data/timescale:/var/lib/postgresql/data

  neo4j:
    image: neo4j:5.24-community
    environment:
      NEO4J_AUTH: neo4j/nexus_dev_password
      NEO4J_PLUGINS: '["apoc"]'
    ports:
      - '7474:7474'
      - '7687:7687'
    volumes:
      - ./.data/neo4j:/data

  nats:
    # F.7 fabric runtime — substrate for ADR-004's 5 named buses (events.>,
    # findings.>, commands.>, approvals.>, audit.>). v0.1 = bus runtime live
    # only; no agent migrations yet (per the v0.1 plan's hard scope boundary).
    #
    # `--js` enables JetStream (the persistent-storage subsystem F.7 v0.1
    # requires for `ensure_streams()`). `--store_dir /data` points JetStream's
    # storage at the mounted volume so the 5 streams' configuration + any
    # buffered messages survive `docker compose down/up` cycles — without
    # the explicit store_dir + volume, streams would vanish on every restart
    # and F.7's `ensure_streams()` would have to re-create them every boot.
    # Single-node config; clustering is a production-deployment concern
    # (E.x track), not a dev concern (per the F.7 v0.1 plan's Q6).
    image: nats:2.10-alpine
    command: ['-js', '--store_dir', '/data']
    ports:
      - '4222:4222' # client connections (nats:// protocol)
      - '8222:8222' # HTTP monitoring (consumed by the healthcheck below)
    volumes:
      - ./.data/nats:/data
    healthcheck:
      # NATS exposes /healthz on the monitoring port when -js is enabled.
      # BusyBox `wget` is preinstalled in the alpine image; -q suppresses
      # progress output, --spider exits 0 on 200 OK without downloading.
      test: ['CMD-SHELL', 'wget -q --spider http://localhost:8222/healthz']
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 5s

  redis:
    image: redis:7-alpine
    ports: ['6379:6379']

  localstack:
    image: localstack/localstack:3.8
    environment:
      SERVICES: s3,iam,sts,cloudtrail,kms,ec2,sns,sqs,lambda,logs
      DEFAULT_REGION: us-east-1
    ports: ['4566:4566']
    volumes:
      - ./.data/localstack:/var/lib/localstack
